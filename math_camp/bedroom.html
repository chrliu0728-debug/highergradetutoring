<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A quiet room</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/webp" href="logo.webp" />
  <style>
    :root {
      /* Phase-driven tokens — JS rewrites these */
      --sky-top:    #BFE2F2;
      --sky-bottom: #FFE6C2;
      --sun-x: 50%;
      --sun-y: 60%;
      --sun-color: #FFE6A0;
      --sun-opacity: 1;
      --window-glow: rgba(255, 220, 160, 0.45);
      --room-tint:  rgba(0, 0, 0, 0.0);
      --room-shade: 1.0;
      --lamp-on: 0;
      --wall:        #2E423B;
      --wall-shadow: #243531;
      --carpet:      #C7B391;
      --carpet-deep: #B09872;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      background: #0d0712;
      color: #FAF6EE;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Wider room — ~16:9 viewport */
    .room {
      position: relative;
      width: 100vw;
      height: 100vh;
      filter: brightness(var(--room-shade));
      transition: filter 1.5s ease;
    }
    .room::after {
      content: ''; position: absolute; inset: 0;
      background: var(--room-tint);
      pointer-events: none;
      mix-blend-mode: multiply;
      transition: background 1.5s ease;
      z-index: 99;
    }

    /* ── Walls + ceiling ── */
    .ceiling {
      position: absolute; left: 0; right: 0; top: 0;
      height: 14%;
      background: linear-gradient(180deg, #1a1f1d 0%, #2a3431 100%);
      z-index: 1;
    }
    .ceiling::after {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4) 100%);
    }
    .wall {
      position: absolute; left: 0; right: 0;
      top: 14%; height: 60%;
      background:
        radial-gradient(ellipse at 20% 60%, rgba(0,0,0,0.55), transparent 50%),
        radial-gradient(ellipse at 80% 60%, rgba(0,0,0,0.55), transparent 50%),
        linear-gradient(180deg, var(--wall) 0%, var(--wall-shadow) 100%);
    }
    .floor {
      position: absolute; left: 0; right: 0; bottom: 0; top: 74%;
      background:
        radial-gradient(ellipse at 50% 0%, var(--carpet) 0%, var(--carpet-deep) 80%);
      box-shadow: inset 0 8px 22px rgba(0,0,0,0.35);
    }
    /* subtle carpet pattern */
    .floor::before {
      content: ''; position: absolute; inset: 0;
      background:
        repeating-linear-gradient(0deg,
          rgba(0,0,0,0.05) 0 2px, transparent 2px 6px),
        repeating-linear-gradient(90deg,
          rgba(0,0,0,0.04) 0 1px, transparent 1px 4px);
      opacity: 0.6;
    }

    /* ── Ceiling fan + light ── */
    .fan {
      position: absolute;
      left: 50%; top: 11%;
      transform: translateX(-50%);
      z-index: 5;
    }
    .fan .mount {
      width: 14px; height: 50px;
      background: linear-gradient(180deg, #1a1f1d, #0a0d0c);
      margin: 0 auto;
      border-radius: 0 0 4px 4px;
    }
    .fan .hub {
      width: 60px; height: 60px;
      background: radial-gradient(circle at 40% 35%, #4a3526 0%, #251915 70%);
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(0,0,0,0.55);
      position: relative;
      margin: -8px auto 0;
    }
    .fan .blades {
      position: absolute; left: 50%; top: 50%;
      width: 360px; height: 360px;
      transform: translate(-50%, -50%);
      animation: fan-spin 3.4s linear infinite;
      pointer-events: none;
    }
    .fan .blade {
      position: absolute;
      left: 50%; top: 50%;
      width: 170px; height: 30px;
      transform-origin: 0% 50%;
      background: linear-gradient(180deg, #4a3526 0%, #2a1d14 100%);
      border-radius: 4px 8px 8px 4px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5);
      opacity: 0.85;
    }
    .fan .blade:nth-child(1) { transform: translate(0, -50%) rotate(0deg); }
    .fan .blade:nth-child(2) { transform: translate(0, -50%) rotate(72deg); }
    .fan .blade:nth-child(3) { transform: translate(0, -50%) rotate(144deg); }
    .fan .blade:nth-child(4) { transform: translate(0, -50%) rotate(216deg); }
    .fan .blade:nth-child(5) { transform: translate(0, -50%) rotate(288deg); }
    @keyframes fan-spin {
      0%   { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .fan .light {
      position: absolute; left: 50%; bottom: -28px;
      transform: translateX(-50%);
      width: 76px; height: 44px;
      background: radial-gradient(ellipse at 50% 30%, #fff5d4 0%, #d8b572 60%, #6c4a22 100%);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      box-shadow: 0 0 30px rgba(255,210,140, calc(var(--lamp-on) * 0.55 + 0.15));
      z-index: 1;
    }
    .fan .light-glow {
      position: absolute; left: 50%; bottom: -180px;
      width: 540px; height: 360px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at 50% 0%, rgba(255,220,150, 0.22) 0%, transparent 60%);
      pointer-events: none;
      opacity: calc(var(--lamp-on) * 0.7 + 0.15);
      transition: opacity 2s ease;
      z-index: 0;
    }

    /* ── Bed (centered, large) ── */
    .bed {
      position: absolute;
      left: 50%; bottom: 8%;
      transform: translateX(-50%);
      width: min(620px, 50vw);
      height: 280px;
      z-index: 6;
    }
    .bed .headboard {
      position: absolute;
      left: 4%; right: 4%; bottom: 100px;
      height: 130px;
      background: linear-gradient(180deg, #5a3d28 0%, #3a2818 100%);
      border-radius: 10px 10px 4px 4px;
      box-shadow:
        inset 0 -10px 20px rgba(0,0,0,0.4),
        0 6px 14px rgba(0,0,0,0.35);
    }
    .bed .headboard::before,
    .bed .headboard::after {
      content: ''; position: absolute;
      top: 14%; bottom: 18%;
      width: 2px;
      background: rgba(0,0,0,0.45);
    }
    .bed .headboard::before { left: 33%; }
    .bed .headboard::after  { right: 33%; }
    .bed .frame-bed {
      position: absolute; left: 0; bottom: 0; right: 0;
      height: 90px;
      background: linear-gradient(180deg, #4a3220 0%, #2a1a0e 100%);
      border-radius: 6px;
      box-shadow: 0 14px 26px rgba(0,0,0,0.45);
    }
    .bed .mattress {
      position: absolute; left: 12px; right: 12px; bottom: 70px;
      height: 60px;
      background: linear-gradient(180deg, #FAF6EE 0%, #D8CDB7 100%);
      border-radius: 6px 6px 4px 4px;
      box-shadow: inset 0 -6px 10px rgba(0,0,0,0.18);
    }
    .bed .blanket {
      position: absolute;
      left: 12px; right: 12px;
      bottom: 84px;
      height: 110px;
      background:
        repeating-linear-gradient(45deg,
          #5C4434 0 12px, #6E5340 12px 22px),
        linear-gradient(180deg, #6E5340 0%, #4A3424 100%);
      border-radius: 8px;
      box-shadow:
        inset 0 -10px 18px rgba(0,0,0,0.28),
        0 6px 14px rgba(0,0,0,0.35);
    }
    .bed .blanket::after {
      content: ''; position: absolute;
      left: 12%; right: 12%; bottom: -8px;
      height: 14px;
      background:
        repeating-linear-gradient(45deg,
          #4A3424 0 10px, #382617 10px 20px);
      border-radius: 0 0 8px 8px;
    }
    .bed .pillow-row {
      position: absolute;
      left: 6%; right: 6%; bottom: 130px;
      height: 70px;
      display: flex; gap: 6px; align-items: center; justify-content: center;
    }
    .bed .pillow {
      flex: 1; height: 100%;
      border-radius: 14px;
      box-shadow:
        inset 0 -6px 8px rgba(0,0,0,0.1),
        0 4px 8px rgba(0,0,0,0.25);
    }
    .bed .pillow.tan   { background: linear-gradient(180deg, #E8D9B8, #B8A172); }
    .bed .pillow.cream { background: linear-gradient(180deg, #FAF6EE, #C8BBA0); }
    .bed .pillow.brown { background: linear-gradient(180deg, #6E5340, #3A2818); }

    /* ── Nightstands ── */
    .nightstand {
      position: absolute;
      bottom: 9%;
      width: 110px; height: 160px;
      z-index: 7;
    }
    .nightstand.left  { left: 16%;  }
    .nightstand.right { right: 16%; }
    .nightstand .body {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #3a2818 0%, #1f1409 100%);
      border-radius: 5px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.45);
    }
    .nightstand .top {
      position: absolute; left: -4px; right: -4px; top: 0;
      height: 8px;
      background: linear-gradient(180deg, #4a3220 0%, #2a1a0e 100%);
      border-radius: 4px 4px 0 0;
    }
    .nightstand .drawer {
      position: absolute; left: 8%; right: 8%; top: 25%;
      height: 28%;
      background: #2a1a0e;
      border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .nightstand .drawer::after {
      content: ''; position: absolute;
      width: 16px; height: 5px; background: #B89060;
      left: 50%; top: 50%; transform: translate(-50%, -50%);
      border-radius: 2px;
    }

    /* ── Bedside lamps ── */
    .lamp {
      position: absolute;
      bottom: calc(9% + 160px);
      width: 70px;
      z-index: 8;
    }
    .lamp.left  { left: calc(16% + 20px); }
    .lamp.right { right: calc(16% + 20px); }
    .lamp .shade {
      position: relative;
      width: 70px; height: 50px;
      background: linear-gradient(180deg, #6e5230 0%, #4a3520 100%);
      clip-path: polygon(22% 0, 78% 0, 100% 100%, 0 100%);
    }
    .lamp .shade.on {
      background: linear-gradient(180deg, #FFE9A8 0%, #FFAA66 100%);
      box-shadow: 0 0 36px rgba(255, 210, 140, 0.7);
    }
    .lamp .stand {
      width: 4px; height: 24px;
      background: #1a1009;
      margin: -2px auto 0;
    }
    .lamp .base {
      width: 32px; height: 6px;
      background: #1a1009;
      border-radius: 2px;
      margin: 0 auto;
    }
    .lamp .glow {
      position: absolute;
      left: 50%; top: 50%;
      width: 360px; height: 360px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,220,150, 0.55) 0%, rgba(255,220,150, 0) 60%);
      pointer-events: none;
      opacity: calc(var(--lamp-on) * 1);
      transition: opacity 2s ease;
      z-index: -1;
    }

    /* ── Picture frame above headboard ── */
    .frame {
      position: absolute;
      left: 50%; top: 22%;
      transform: translateX(-50%);
      width: 240px; height: 130px;
      background: #1a1009;
      padding: 8px;
      border-radius: 4px;
      box-shadow:
        0 6px 16px rgba(0,0,0,0.45),
        inset 0 0 0 2px #4a3220;
      z-index: 4;
    }
    .frame .matte {
      width: 100%; height: 100%;
      background: linear-gradient(180deg, #FAEDD3 0%, #E8C9A0 60%, #C29472 100%);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 0 4px #FAF6EE;
    }
    .frame .mtn-back {
      position: absolute; bottom: 22%; left: 0; right: 0;
      height: 0;
      border-bottom: 60px solid #6E5340;
      border-left: 60px solid transparent;
      border-right: 60px solid transparent;
      width: 50%;
      margin-left: 25%;
    }
    .frame .mtn-front-l, .frame .mtn-front-r {
      position: absolute; bottom: 22%;
      width: 0; height: 0;
      border-bottom: 50px solid #4A3424;
      border-left: 40px solid transparent;
      border-right: 40px solid transparent;
    }
    .frame .mtn-front-l { left: 5%; }
    .frame .mtn-front-r { right: 5%; }
    .frame .water {
      position: absolute; left: 0; right: 0; bottom: 0; height: 22%;
      background: linear-gradient(180deg, #6BA8C2 0%, #2E5A78 100%);
    }
    .frame .sun-pic {
      position: absolute; right: 22%; top: 18%;
      width: 18px; height: 18px;
      background: #FFD485;
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255,212,133,0.6);
    }

    /* ── Window with vertical blinds ── */
    .window {
      position: absolute;
      right: 4%; top: 16%;
      width: 200px; height: 260px;
      box-shadow:
        0 0 0 10px #1a1009,
        0 0 0 12px #3a2818,
        0 22px 36px var(--window-glow);
      transition: box-shadow 1.5s ease;
      overflow: hidden;
      z-index: 3;
    }
    .window .sky {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
      transition: background 1.5s ease;
    }
    .window .sun {
      position: absolute;
      width: 70px; height: 70px;
      left: var(--sun-x); top: var(--sun-y);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, var(--sun-color) 0%, var(--sun-color) 40%, rgba(255,220,160,0) 70%);
      opacity: var(--sun-opacity);
      filter: blur(0.5px);
      transition: top 2s ease, left 2s ease, background 2s ease, opacity 2s ease;
    }
    .window .stars {
      position: absolute; inset: 0;
      background:
        radial-gradient(1.4px 1.4px at 18% 30%, #fff, transparent),
        radial-gradient(1px 1px at 60% 14%, #fff, transparent),
        radial-gradient(1.6px 1.6px at 78% 40%, #fff, transparent),
        radial-gradient(1px 1px at 35% 55%, #fff, transparent),
        radial-gradient(1.2px 1.2px at 70% 70%, #fff, transparent),
        radial-gradient(1px 1px at 15% 75%, #fff, transparent),
        radial-gradient(1.4px 1.4px at 90% 22%, #fff, transparent),
        radial-gradient(1px 1px at 50% 28%, #fff, transparent);
      opacity: 0;
      transition: opacity 2s ease;
    }
    /* Vertical blinds — translucent slats over the sky */
    .window .blinds {
      position: absolute; inset: 0;
      display: flex; gap: 1px;
      pointer-events: none;
    }
    .window .blinds .slat {
      flex: 1;
      background: linear-gradient(180deg, rgba(248,242,228,0.78) 0%, rgba(220,210,190,0.62) 100%);
      box-shadow: inset -2px 0 0 rgba(0,0,0,0.08);
    }

    /* ── Plants ── */
    .plant {
      position: absolute;
      bottom: 2%;
      z-index: 6;
    }
    .plant .pot {
      width: 64px; height: 50px;
      background: linear-gradient(180deg, #6e3f24 0%, #3e2114 100%);
      border-radius: 4px 4px 14px 14px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.4);
    }
    .plant .leaves {
      position: relative;
      width: 110px; height: 130px;
      margin: 0 auto -10px;
    }
    .plant .leaf {
      position: absolute;
      width: 16px; height: 70px;
      background: linear-gradient(180deg, #5BA871 0%, #2E5C3F 100%);
      border-radius: 50% 50% 0 0 / 80% 80% 0 0;
      transform-origin: 50% 100%;
      bottom: 0;
    }
    .plant .leaf:nth-child(1) { left: 18px;  transform: rotate(-30deg); }
    .plant .leaf:nth-child(2) { left: 30px;  transform: rotate(-15deg); height: 80px; }
    .plant .leaf:nth-child(3) { left: 46px;  transform: rotate(0deg);   height: 92px; }
    .plant .leaf:nth-child(4) { left: 62px;  transform: rotate(15deg);  height: 80px; }
    .plant .leaf:nth-child(5) { left: 76px;  transform: rotate(30deg);  }
    .plant .leaf:nth-child(6) { left: 38px;  transform: rotate(-8deg);  height: 58px; background: #4F9A65; }
    .plant .leaf:nth-child(7) { left: 56px;  transform: rotate(8deg);   height: 60px; background: #4F9A65; }
    .plant.l { left: 3%; }
    .plant.r { right: 3%; }
    .plant.r .leaves { width: 130px; height: 150px; }

    /* Smaller plant on the left nightstand */
    .mini-plant {
      position: absolute;
      left: calc(16% + 6px); bottom: calc(9% + 160px);
      z-index: 9;
    }
    .mini-plant .pot {
      width: 26px; height: 18px;
      background: linear-gradient(180deg, #6e3f24, #3e2114);
      border-radius: 2px 2px 5px 5px;
      margin: 0 auto;
    }
    .mini-plant .leaves {
      position: relative; width: 36px; height: 28px; margin: 0 auto -3px;
    }
    .mini-plant .leaf {
      position: absolute; width: 9px; height: 22px;
      background: #4F9A65;
      border-radius: 50% 50% 0 0 / 80% 80% 0 0;
      transform-origin: 50% 100%; bottom: 0;
    }
    .mini-plant .leaf:nth-child(1) { left: 4px;  transform: rotate(-35deg); }
    .mini-plant .leaf:nth-child(2) { left: 14px; transform: rotate(0deg);   height: 26px; }
    .mini-plant .leaf:nth-child(3) { left: 24px; transform: rotate(35deg);  }

    /* ── Wall clock ── */
    .clock {
      position: absolute;
      left: 14%; top: 18%;
      width: 88px; height: 88px;
      background: radial-gradient(circle at 30% 30%, #FFFAF0, #DCCDB0);
      border-radius: 50%;
      box-shadow: 0 0 0 5px #1a1009, 0 6px 14px rgba(0,0,0,0.5);
      z-index: 4;
    }
    .clock .num {
      position: absolute; left: 50%; top: 50%;
      width: 6px; height: 10px;
      transform: translate(-50%, -38px);
      background: #2C1F12; border-radius: 1px;
    }
    .clock .num.three { transform: translate(34px, -50%); width: 10px; height: 6px; }
    .clock .num.six   { transform: translate(-50%, 28px); }
    .clock .num.nine  { transform: translate(-44px, -50%); width: 10px; height: 6px; }
    .clock .hand {
      position: absolute; left: 50%; top: 50%;
      transform-origin: 50% 100%;
      background: #2C1F12;
      border-radius: 3px;
    }
    .clock .hand.hour   { width: 4px; height: 22px; transform: translate(-50%, -100%); }
    .clock .hand.minute { width: 3px; height: 32px; transform: translate(-50%, -100%); background: #4A2E18; }
    .clock .hand.second { width: 1.5px; height: 36px; transform: translate(-50%, -100%); background: #B83232; }
    .clock .center {
      position: absolute; left: 50%; top: 50%;
      width: 7px; height: 7px;
      background: #2C1F12; border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .clock .digital {
      position: absolute; left: 50%; bottom: -26px;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', 'SFMono-Regular', monospace;
      font-size: 11px;
      color: #FAF6EE;
      background: rgba(0, 0, 0, 0.55);
      padding: 2px 8px;
      border-radius: 6px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* ── Toast (song change) ── */
    .song-toast {
      position: fixed;
      right: 24px; bottom: 24px;
      background: rgba(20, 14, 36, 0.92);
      color: #FAF6EE;
      padding: 14px 18px 14px 16px;
      border-radius: 12px;
      box-shadow: 0 18px 38px rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 230, 160, 0.18);
      display: flex; align-items: center; gap: 12px;
      max-width: 320px;
      transform: translateY(20px);
      opacity: 0;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease;
      z-index: 200;
      pointer-events: none;
    }
    .song-toast.show { transform: translateY(0); opacity: 1; }
    .song-toast .icon {
      font-size: 22px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #E8B47B, #B45B6E);
      border-radius: 8px;
    }
    .song-toast .meta { display: flex; flex-direction: column; line-height: 1.3; }
    .song-toast .label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(250, 246, 238, 0.55);
      margin-bottom: 2px;
    }
    .song-toast .title  { font-weight: 600; font-size: .95rem; }
    .song-toast .artist { font-size: .82rem; color: rgba(250, 246, 238, 0.7); }

    /* ── Music control ── */
    .music-controls {
      position: fixed;
      right: 24px; top: 24px;
      display: flex; gap: 8px;
      z-index: 150;
    }
    .music-controls button {
      width: 40px; height: 40px;
      background: rgba(20, 14, 36, 0.8);
      color: #FAF6EE;
      border: 1px solid rgba(255, 230, 160, 0.18);
      border-radius: 50%;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: background .15s, transform .15s;
    }
    .music-controls button:hover { background: rgba(40, 28, 60, 0.9); transform: scale(1.06); }

    /* Start overlay */
    .start-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(20, 14, 36, 0.85);
      backdrop-filter: blur(6px);
      z-index: 300;
      cursor: pointer;
      transition: opacity .4s ease;
    }
    .start-overlay.hide { opacity: 0; pointer-events: none; }
    .start-overlay .card {
      background: rgba(40, 28, 60, 0.7);
      border: 1px solid rgba(255, 230, 160, 0.18);
      border-radius: 16px;
      padding: 32px 36px;
      text-align: center;
      max-width: 360px;
    }
    .start-overlay h2 { font-size: 1.3rem; margin: 0 0 8px; font-weight: 600; letter-spacing: -0.01em; }
    .start-overlay p  { font-size: .9rem; opacity: 0.8; margin: 0 0 18px; line-height: 1.55; }
    .start-overlay button {
      background: linear-gradient(135deg, #E8B47B, #B45B6E);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: .95rem;
    }

    .exit-link {
      position: fixed; top: 18px; left: 20px;
      font-size: .78rem; color: rgba(250, 246, 238, 0.5);
      text-decoration: none; z-index: 150;
      letter-spacing: 0.04em;
    }
    .exit-link:hover { color: rgba(250, 246, 238, 0.9); }

    @media (max-width: 720px) {
      .frame { width: 180px; height: 100px; top: 22%; }
      .window { width: 140px; height: 200px; }
      .nightstand { width: 80px; height: 120px; }
      .lamp { width: 56px; }
      .lamp .shade { width: 56px; height: 40px; }
      .clock { width: 64px; height: 64px; left: 6%; top: 20%; }
      .plant.l, .plant.r { transform: scale(0.7); transform-origin: bottom; }
    }
  </style>
</head>
<body>

<a href="student-portal.html" class="exit-link">← back to portal</a>

<div class="stage">
  <div class="room">
    <div class="ceiling"></div>
    <div class="wall"></div>
    <div class="floor"></div>

    <!-- Wall clock -->
    <div class="clock" aria-label="Clock">
      <div class="num twelve"></div>
      <div class="num three"></div>
      <div class="num six"></div>
      <div class="num nine"></div>
      <div class="hand hour"   id="hand-hour"></div>
      <div class="hand minute" id="hand-minute"></div>
      <div class="hand second" id="hand-second"></div>
      <div class="center"></div>
      <div class="digital" id="digital">--:--</div>
    </div>

    <!-- Picture above headboard -->
    <div class="frame">
      <div class="matte">
        <div class="sun-pic"></div>
        <div class="mtn-back"></div>
        <div class="mtn-front-l"></div>
        <div class="mtn-front-r"></div>
        <div class="water"></div>
      </div>
    </div>

    <!-- Window with vertical blinds -->
    <div class="window">
      <div class="sky"></div>
      <div class="stars" id="stars"></div>
      <div class="sun" id="sun"></div>
      <div class="blinds">
        <div class="slat"></div><div class="slat"></div><div class="slat"></div>
        <div class="slat"></div><div class="slat"></div><div class="slat"></div>
        <div class="slat"></div><div class="slat"></div><div class="slat"></div>
        <div class="slat"></div><div class="slat"></div><div class="slat"></div>
      </div>
    </div>

    <!-- Ceiling fan with light -->
    <div class="fan">
      <div class="mount"></div>
      <div class="hub">
        <div class="blades">
          <div class="blade"></div><div class="blade"></div><div class="blade"></div>
          <div class="blade"></div><div class="blade"></div>
        </div>
      </div>
      <div class="light"></div>
      <div class="light-glow"></div>
    </div>

    <!-- Bed -->
    <div class="bed">
      <div class="headboard"></div>
      <div class="frame-bed"></div>
      <div class="mattress"></div>
      <div class="blanket"></div>
      <div class="pillow-row">
        <div class="pillow tan"></div>
        <div class="pillow cream"></div>
        <div class="pillow brown"></div>
        <div class="pillow cream"></div>
        <div class="pillow tan"></div>
      </div>
    </div>

    <!-- Nightstands -->
    <div class="nightstand left">
      <div class="top"></div>
      <div class="body"></div>
      <div class="drawer"></div>
    </div>
    <div class="nightstand right">
      <div class="top"></div>
      <div class="body"></div>
      <div class="drawer"></div>
    </div>

    <!-- Bedside lamps -->
    <div class="lamp left">
      <div class="glow"></div>
      <div class="shade" id="lamp-shade-l"></div>
      <div class="stand"></div>
      <div class="base"></div>
    </div>
    <div class="lamp right">
      <div class="glow"></div>
      <div class="shade" id="lamp-shade-r"></div>
      <div class="stand"></div>
      <div class="base"></div>
    </div>

    <!-- Mini plant on left nightstand -->
    <div class="mini-plant">
      <div class="leaves">
        <div class="leaf"></div>
        <div class="leaf"></div>
        <div class="leaf"></div>
      </div>
      <div class="pot"></div>
    </div>

    <!-- Floor plants -->
    <div class="plant l">
      <div class="leaves">
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div>
      </div>
      <div class="pot"></div>
    </div>
    <div class="plant r">
      <div class="leaves">
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div>
      </div>
      <div class="pot"></div>
    </div>
  </div>
</div>

<!-- Music controls -->
<div class="music-controls">
  <button id="play-pause" title="Play / Pause">⏸</button>
  <button id="skip-next"  title="Next track">⏭</button>
</div>

<!-- Song-change toast -->
<div class="song-toast" id="song-toast" role="status" aria-live="polite">
  <div class="icon">🎵</div>
  <div class="meta">
    <span class="label">Now playing</span>
    <span class="title"  id="toast-title">—</span>
    <span class="artist" id="toast-artist">—</span>
  </div>
</div>

<!-- Start overlay -->
<div class="start-overlay" id="start-overlay">
  <div class="card">
    <h2>Welcome back.</h2>
    <p>Pull up a chair, kick your shoes off. Click anywhere to settle in — the music will start.</p>
    <button id="start-btn">Enter the room</button>
  </div>
</div>

<audio id="player" preload="auto"></audio>

<script>
/* ── 1. Time-of-day phases ─────────────────────────────────────── */
const ROOT = document.documentElement;
const sunEl     = document.getElementById('sun');
const starsEl   = document.getElementById('stars');
const lampShadeL= document.getElementById('lamp-shade-l');
const lampShadeR= document.getElementById('lamp-shade-r');

const PHASES = {
  day: {
    skyTop: '#8FCDEA', skyBottom: '#FFE6BC',
    sunX: '52%', sunY: '28%', sunColor: '#FFEAA0', sunOp: 1,
    windowGlow: 'rgba(255, 220, 160, 0.45)',
    roomTint: 'rgba(255, 244, 226, 0.0)',
    roomShade: 1.0,
    lampOn: 0,
    starsOp: 0,
  },
  dusk: {
    skyTop: '#E58F6A', skyBottom: '#FAC58A',
    sunX: '70%', sunY: '70%', sunColor: '#FF7E55', sunOp: 1,
    windowGlow: 'rgba(255, 130, 80, 0.55)',
    roomTint: 'rgba(255, 150, 90, 0.10)',
    roomShade: 0.78,
    lampOn: 0.6,
    starsOp: 0,
  },
  night: {
    skyTop: '#0E1733', skyBottom: '#2A2447',
    sunX: '30%', sunY: '30%', sunColor: '#E8E3F8', sunOp: 0.85,
    windowGlow: 'rgba(60, 80, 140, 0.45)',
    roomTint: 'rgba(20, 30, 70, 0.45)',
    roomShade: 0.42,
    lampOn: 1.0,
    starsOp: 1,
  },
  dawn: {
    skyTop: '#A86F8E', skyBottom: '#FFD4A0',
    sunX: '32%', sunY: '76%', sunColor: '#FFB97A', sunOp: 0.9,
    windowGlow: 'rgba(255, 180, 130, 0.5)',
    roomTint: 'rgba(255, 180, 140, 0.06)',
    roomShade: 0.74,
    lampOn: 0.45,
    starsOp: 0,
  },
};

function phaseFor(date) {
  const h = date.getHours();
  if (h >= 8 && h < 19)  return 'day';
  if (h >= 19 && h < 21) return 'dusk';
  if (h >= 21 || h < 6)  return 'night';
  return 'dawn';
}

let lastPhase = null;
function applyPhase(force) {
  const phase = phaseFor(new Date());
  if (!force && phase === lastPhase) return;
  lastPhase = phase;
  const p = PHASES[phase];
  ROOT.style.setProperty('--sky-top',     p.skyTop);
  ROOT.style.setProperty('--sky-bottom',  p.skyBottom);
  ROOT.style.setProperty('--sun-x',       p.sunX);
  ROOT.style.setProperty('--sun-y',       p.sunY);
  ROOT.style.setProperty('--sun-color',   p.sunColor);
  ROOT.style.setProperty('--sun-opacity', p.sunOp);
  ROOT.style.setProperty('--window-glow', p.windowGlow);
  ROOT.style.setProperty('--room-tint',   p.roomTint);
  ROOT.style.setProperty('--room-shade',  p.roomShade);
  ROOT.style.setProperty('--lamp-on',     p.lampOn);
  starsEl.style.opacity = p.starsOp;
  if (p.lampOn >= 0.5) { lampShadeL.classList.add('on'); lampShadeR.classList.add('on'); }
  else                 { lampShadeL.classList.remove('on'); lampShadeR.classList.remove('on'); }
}
applyPhase(true);
setInterval(applyPhase, 30 * 1000);

/* ── 2. Wall clock ─────────────────────────────────────────────── */
const handHour  = document.getElementById('hand-hour');
const handMin   = document.getElementById('hand-minute');
const handSec   = document.getElementById('hand-second');
const digitalEl = document.getElementById('digital');
function tick() {
  const now = new Date();
  const ms  = now.getMilliseconds();
  const s   = now.getSeconds() + ms / 1000;
  const m   = now.getMinutes() + s / 60;
  const h   = (now.getHours() % 12) + m / 60;
  handSec.style.transform  = `translate(-50%, -100%) rotate(${s * 6}deg)`;
  handMin.style.transform  = `translate(-50%, -100%) rotate(${m * 6}deg)`;
  handHour.style.transform = `translate(-50%, -100%) rotate(${h * 30}deg)`;
  digitalEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
tick();
setInterval(tick, 1000);

/* ── 3. Music playlist ─────────────────────────────────────────── */
const PLAYLIST = [
  { file: 'VibeDepot - Relax.mp3',                title: 'Relax',                artist: 'VibeDepot' },
  { file: 'Amarent - Hacienda (Suno Remix).mp3',  title: 'Hacienda (Suno Remix)', artist: 'Amarent'  },
  { file: 'VibeDepot - Yoga Music.mp3',           title: 'Yoga Music',            artist: 'VibeDepot' },
];

const player    = document.getElementById('player');
const toastEl   = document.getElementById('song-toast');
const toastTitle  = document.getElementById('toast-title');
const toastArtist = document.getElementById('toast-artist');
const playPauseBtn = document.getElementById('play-pause');
const skipBtn      = document.getElementById('skip-next');
let trackIndex = 0;

function loadTrack(i, autoplay) {
  trackIndex = ((i % PLAYLIST.length) + PLAYLIST.length) % PLAYLIST.length;
  const track = PLAYLIST[trackIndex];
  player.src = encodeURI(track.file);
  player.loop = false;
  if (autoplay) player.play().catch(() => {});
  showSongToast(track);
}
function showSongToast(track) {
  toastTitle.textContent  = track.title;
  toastArtist.textContent = track.artist;
  toastEl.classList.add('show');
  clearTimeout(showSongToast._t);
  showSongToast._t = setTimeout(() => toastEl.classList.remove('show'), 4500);
}
player.addEventListener('ended', () => loadTrack(trackIndex + 1, true));
playPauseBtn.addEventListener('click', () => {
  if (player.paused) { player.play().catch(() => {}); playPauseBtn.textContent = '⏸'; }
  else               { player.pause(); playPauseBtn.textContent = '▶'; }
});
player.addEventListener('play',  () => { playPauseBtn.textContent = '⏸'; });
player.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });
skipBtn.addEventListener('click', () => loadTrack(trackIndex + 1, !player.paused));

/* ── 4. Start overlay (autoplay gesture) ───────────────────────── */
const startOverlay = document.getElementById('start-overlay');
const startBtn     = document.getElementById('start-btn');
function start() {
  startOverlay.classList.add('hide');
  loadTrack(0, true);
  setTimeout(() => startOverlay.remove(), 600);
}
startBtn.addEventListener('click', start);
startOverlay.addEventListener('click', (e) => { if (e.target === startOverlay) start(); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A quiet room</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/webp" href="logo.webp" />
  <style>
    :root {
      --bg-image: url('bedroom-night.png');
      --bg-tint:  rgba(0,0,0,0);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      background: #0d0712;
      color: #FAF0E0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* Crossfading scene layers — two stacked images so we can dissolve
       between phases instead of snapping. */
    .scene {
      position: absolute; inset: 0;
      z-index: 0;
    }
    .scene-img {
      position: absolute; inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      transition: opacity 1.6s ease;
    }
    .scene-img.a { opacity: 1;  }
    .scene-img.b { opacity: 0;  }

    /* Optional vignette for cohesion */
    .scene::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,0.30) 100%);
      pointer-events: none;
    }

    /* Lamp-hint glow that pulses on at night/dusk so the warmth lands
       even if the underlying image looks slightly cool. */
    .lamp-glow {
      position: absolute;
      bottom: 18%; right: 18%;
      width: 60vmin; height: 60vmin;
      transform: translate(50%, 50%);
      background: radial-gradient(circle,
        rgba(255, 215, 140, 0.32) 0%,
        rgba(255, 215, 140, 0.12) 35%,
        rgba(255, 215, 140, 0) 65%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 1.6s ease;
      z-index: 5;
    }

    /* Floating clock — sits on top of the room */
    .clock {
      position: fixed;
      top: 22px; right: 86px;
      width: 90px; height: 90px;
      background: radial-gradient(circle at 30% 30%, #FFFAF0, #DCCDB0);
      border-radius: 50%;
      box-shadow: 0 0 0 5px rgba(60, 40, 22, 0.92), 0 8px 18px rgba(0,0,0,0.45);
      z-index: 100;
    }
    .clock .num {
      position: absolute; left: 50%; top: 50%;
      width: 6px; height: 10px;
      transform: translate(-50%, -36px);
      background: #2C1F12; border-radius: 1px;
    }
    .clock .num.three { transform: translate(34px, -50%); width: 10px; height: 6px; }
    .clock .num.six   { transform: translate(-50%, 28px); }
    .clock .num.nine  { transform: translate(-44px, -50%); width: 10px; height: 6px; }
    .clock .hand {
      position: absolute; left: 50%; top: 50%;
      transform-origin: 50% 100%;
      background: #2C1F12; border-radius: 2px;
    }
    .clock .hand.hour   { width: 4px; height: 22px;  transform: translate(-50%, -100%); }
    .clock .hand.minute { width: 3px; height: 32px;  transform: translate(-50%, -100%); background: #4A2E18; }
    .clock .hand.second { width: 1.5px; height: 36px;transform: translate(-50%, -100%); background: #B83232; }
    .clock .center {
      position: absolute; left: 50%; top: 50%;
      width: 7px; height: 7px;
      background: #2C1F12; border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }
    .clock .digital {
      position: absolute; left: 50%; bottom: -26px;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', 'SFMono-Regular', monospace;
      font-size: 11px;
      color: #FAF0E0;
      background: rgba(20, 12, 6, 0.65);
      padding: 2px 8px;
      border-radius: 6px;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    /* Now-playing card */
    .now-playing {
      position: fixed;
      right: 24px; bottom: 24px;
      width: 320px;
      background: rgba(28, 20, 12, 0.94);
      color: #FAF0E0;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 220, 160, 0.20);
      overflow: hidden;
      transform: translateY(20px);
      opacity: 0;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s ease, height .3s ease;
      z-index: 200;
    }
    .now-playing.show { transform: translateY(0); opacity: 1; }
    .np-head {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px 12px;
      cursor: pointer;
    }
    .np-head .icon {
      font-size: 20px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #E8B47B, #B45B6E);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .np-head .meta { display: flex; flex-direction: column; line-height: 1.3; flex: 1; min-width: 0; }
    .np-head .label {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(248, 241, 217, 0.55);
      margin-bottom: 2px;
    }
    .np-head .title  { font-weight: 600; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-head .artist { font-size: .82rem; color: rgba(248, 241, 217, 0.78); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-head .toggle {
      flex-shrink: 0;
      width: 28px; height: 28px;
      background: rgba(255, 220, 160, 0.10);
      border: none; border-radius: 50%;
      color: #FAF0E0;
      cursor: pointer; font-size: 14px;
      transition: background .15s, transform .25s;
    }
    .np-head .toggle:hover { background: rgba(255, 220, 160, 0.20); }
    .np-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height .35s ease, padding .25s ease;
      padding: 0 18px;
      border-top: 1px solid rgba(255, 220, 160, 0);
    }
    .now-playing.expanded .np-body {
      max-height: 280px;
      padding: 12px 18px 18px;
      border-top: 1px solid rgba(255, 220, 160, 0.10);
    }
    .now-playing.expanded .np-head .toggle { transform: rotate(180deg); }
    .np-bio {
      font-size: .82rem; line-height: 1.55;
      color: rgba(248, 241, 217, 0.85);
      margin-bottom: 12px;
    }
    .np-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600;
      color: #FFD89A;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255, 220, 160, 0.10);
      border: 1px solid rgba(255, 220, 160, 0.20);
      transition: background .15s;
    }
    .np-link:hover { background: rgba(255, 220, 160, 0.18); }

    .music-controls {
      position: fixed;
      right: 24px; top: 24px;
      display: flex; gap: 8px;
      z-index: 150;
    }
    .music-controls button {
      width: 40px; height: 40px;
      background: rgba(28, 20, 12, 0.85);
      color: #FAF0E0;
      border: 1px solid rgba(255, 220, 160, 0.22);
      border-radius: 50%;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
      transition: background .15s, transform .15s;
    }
    .music-controls button:hover { background: rgba(60, 40, 22, 0.95); transform: scale(1.06); }

    .start-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(28, 20, 12, 0.88);
      backdrop-filter: blur(6px);
      z-index: 300;
      cursor: pointer;
      transition: opacity .4s ease;
    }
    .start-overlay.hide { opacity: 0; pointer-events: none; }
    .start-overlay .card {
      background: rgba(60, 40, 22, 0.85);
      border: 1px solid rgba(255, 220, 160, 0.22);
      border-radius: 16px;
      padding: 32px 36px;
      text-align: center;
      max-width: 360px;
      color: #FAF0E0;
    }
    .start-overlay h2 { font-size: 1.3rem; margin: 0 0 8px; font-weight: 600; }
    .start-overlay p  { font-size: .9rem; opacity: 0.85; margin: 0 0 18px; line-height: 1.55; }
    .start-overlay button {
      background: linear-gradient(135deg, #F2DC7E, #C77B5C);
      color: #2C2A20;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: .95rem;
    }

    .exit-link {
      position: fixed; top: 22px; left: 22px;
      font-size: .8rem; color: rgba(250, 240, 224, 0.65);
      text-decoration: none; z-index: 150;
      letter-spacing: 0.04em;
      background: rgba(28, 20, 12, 0.55);
      padding: 6px 12px;
      border-radius: 8px;
      backdrop-filter: blur(8px);
    }
    .exit-link:hover { color: rgba(250, 240, 224, 1); background: rgba(28, 20, 12, 0.75); }

    @media (max-width: 720px) {
      .clock { width: 64px; height: 64px; right: 76px; }
      .clock .hand.hour   { height: 16px; }
      .clock .hand.minute { height: 24px; }
      .clock .hand.second { height: 26px; }
      .clock .num       { transform: translate(-50%, -26px); width: 4px; height: 7px; }
      .clock .num.three { transform: translate(24px, -50%);  width: 7px; height: 4px; }
      .clock .num.six   { transform: translate(-50%, 20px); }
      .clock .num.nine  { transform: translate(-32px, -50%); width: 7px; height: 4px; }
      .clock .digital   { font-size: 10px; bottom: -22px; }
      .now-playing      { width: calc(100vw - 32px); right: 16px; }
    }
  </style>
</head>
<body>

<a href="student-portal.html" class="exit-link">← back to portal</a>

<div class="stage">
  <div class="scene">
    <div class="scene-img a" id="scene-a"></div>
    <div class="scene-img b" id="scene-b"></div>
  </div>
  <div class="lamp-glow" id="lamp-glow"></div>
</div>

<!-- Wall clock -->
<div class="clock" aria-label="Clock">
  <div class="num twelve"></div>
  <div class="num three"></div>
  <div class="num six"></div>
  <div class="num nine"></div>
  <div class="hand hour"   id="hand-hour"></div>
  <div class="hand minute" id="hand-minute"></div>
  <div class="hand second" id="hand-second"></div>
  <div class="center"></div>
  <div class="digital" id="digital">--:--</div>
</div>

<div class="music-controls">
  <button id="play-pause" title="Play / Pause">⏸</button>
  <button id="skip-next"  title="Next track">⏭</button>
</div>

<div class="now-playing" id="now-playing" role="region" aria-label="Music player">
  <div class="np-head" id="np-head">
    <div class="icon">🎵</div>
    <div class="meta">
      <span class="label">Now playing</span>
      <span class="title"  id="toast-title">—</span>
      <span class="artist" id="toast-artist">—</span>
    </div>
    <button class="toggle" id="np-toggle" aria-label="Toggle artist info">▾</button>
  </div>
  <div class="np-body">
    <p class="np-bio" id="np-bio">—</p>
    <a class="np-link" id="np-link" href="#" target="_blank" rel="noopener">
      ↗ Listen on Free Music Archive
    </a>
  </div>
</div>

<div class="start-overlay" id="start-overlay">
  <div class="card">
    <h2>Welcome back.</h2>
    <p>Pull up a chair. Click anywhere to settle in — the music will start.</p>
    <button id="start-btn">Enter the room</button>
  </div>
</div>

<audio id="player" preload="auto"></audio>

<script>
/* ── 1. Phase imagery ─────────────────────────────────────────── */
const PHASES = {
  day:   { img: 'bedroom-day.png',   lampOpacity: 0   },
  dusk:  { img: 'bedroom-dusk.png',  lampOpacity: 0.7 },
  night: { img: 'bedroom-night.png', lampOpacity: 1.0 },
  dawn:  { img: 'bedroom-dawn.png',  lampOpacity: 0.5 },
};

function phaseFor(date) {
  const h = date.getHours();
  if (h >= 8 && h < 19)  return 'day';
  if (h >= 19 && h < 21) return 'dusk';
  if (h >= 21 || h < 6)  return 'night';
  return 'dawn';
}

const sceneA = document.getElementById('scene-a');
const sceneB = document.getElementById('scene-b');
const lampGlow = document.getElementById('lamp-glow');
let topLayer = sceneA, hidLayer = sceneB;
let lastPhase = null;

function applyPhase(force) {
  const phase = phaseFor(new Date());
  if (!force && phase === lastPhase) return;
  lastPhase = phase;
  const p = PHASES[phase];

  // Crossfade: load on hidden layer, then swap opacities
  hidLayer.style.backgroundImage = `url('${p.img}')`;
  // Wait one frame so the browser commits the bg before we fade
  requestAnimationFrame(() => {
    topLayer.style.opacity = '0';
    hidLayer.style.opacity = '1';
    [topLayer, hidLayer] = [hidLayer, topLayer];
  });

  lampGlow.style.opacity = p.lampOpacity;
}

// Initial paint — set both layers to the current image so first
// transition crossfades from "the same image" rather than from black.
(function initialPaint() {
  const phase = phaseFor(new Date());
  const url = `url('${PHASES[phase].img}')`;
  sceneA.style.backgroundImage = url;
  sceneB.style.backgroundImage = url;
  lampGlow.style.opacity = PHASES[phase].lampOpacity;
  lastPhase = phase;
})();

setInterval(applyPhase, 30 * 1000);

/* ── 2. Wall clock ────────────────────────────────────────────── */
const handHour  = document.getElementById('hand-hour');
const handMin   = document.getElementById('hand-minute');
const handSec   = document.getElementById('hand-second');
const digitalEl = document.getElementById('digital');
function tick() {
  const now = new Date();
  const ms  = now.getMilliseconds();
  const s   = now.getSeconds() + ms / 1000;
  const m   = now.getMinutes() + s / 60;
  const h   = (now.getHours() % 12) + m / 60;
  handSec.style.transform  = `translate(-50%, -100%) rotate(${s * 6}deg)`;
  handMin.style.transform  = `translate(-50%, -100%) rotate(${m * 6}deg)`;
  handHour.style.transform = `translate(-50%, -100%) rotate(${h * 30}deg)`;
  digitalEl.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
tick();
setInterval(tick, 1000);

/* ── 3. Music: artists + playlist ─────────────────────────────── */
const ARTISTS = {
  'Amarent': {
    bio: "Amarent — an anagram of Maarten Schellekens — is the artist name under which Maarten releases his electronic music. Layered synths, warm pads, and easygoing grooves.",
    url: 'https://freemusicarchive.org/music/amarent/',
  },
  'VibeDepot': {
    bio: "VibeDepot — quietly prolific producer of mellow, instrumental backdrops. Think yoga-studio bass lines and dusty café synths.",
    url: 'https://freemusicarchive.org/music/vibedepot/',
  },
  'Happiness In Music': {
    bio: "Happiness In Music — soft ambient and meditative pieces; the kind of music that fits a slow afternoon and an open notebook.",
    url: 'https://freemusicarchive.org/music/happiness-in-music/',
  },
};

const PLAYLIST = [
  { file: 'VibeDepot - Relax.mp3',                    title: 'Relax',                 artist: 'VibeDepot' },
  { file: 'Amarent - Hacienda (Suno Remix).mp3',      title: 'Hacienda (Suno Remix)', artist: 'Amarent'  },
  { file: 'Happiness In Music - Space.mp3',           title: 'Space',                 artist: 'Happiness In Music' },
  { file: 'VibeDepot - Yoga Music.mp3',               title: 'Yoga Music',            artist: 'VibeDepot' },
  { file: 'Happiness In Music - Yoga Music.mp3',      title: 'Yoga Music',            artist: 'Happiness In Music' },
  { file: 'VibeDepot - Music Yoga.mp3',               title: 'Music Yoga',            artist: 'VibeDepot' },
  { file: 'Happiness In Music - Yoga Music Free.mp3', title: 'Yoga Music Free',       artist: 'Happiness In Music' },
];

const player    = document.getElementById('player');
const npEl      = document.getElementById('now-playing');
const npHead    = document.getElementById('np-head');
const npToggle  = document.getElementById('np-toggle');
const titleEl   = document.getElementById('toast-title');
const artistEl  = document.getElementById('toast-artist');
const bioEl     = document.getElementById('np-bio');
const linkEl    = document.getElementById('np-link');
const playPauseBtn = document.getElementById('play-pause');
const skipBtn      = document.getElementById('skip-next');
let trackIndex = 0;

function loadTrack(i, autoplay) {
  trackIndex = ((i % PLAYLIST.length) + PLAYLIST.length) % PLAYLIST.length;
  const track = PLAYLIST[trackIndex];
  player.src = encodeURI(track.file);
  player.loop = false;
  if (autoplay) player.play().catch(() => {});
  showSongCard(track);
}
function showSongCard(track) {
  titleEl.textContent  = track.title;
  artistEl.textContent = track.artist;
  const a = ARTISTS[track.artist] || { bio: 'Curated background music.', url: '#' };
  bioEl.textContent  = a.bio;
  linkEl.href        = a.url;
  npEl.classList.add('show');
  clearTimeout(showSongCard._t);
  if (!npEl.classList.contains('expanded')) {
    showSongCard._t = setTimeout(() => npEl.classList.remove('show'), 6000);
  }
}
npHead.addEventListener('click', () => {
  npEl.classList.toggle('expanded');
  npEl.classList.add('show');
  clearTimeout(showSongCard._t);
});
npToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  npEl.classList.toggle('expanded');
  npEl.classList.add('show');
  clearTimeout(showSongCard._t);
});

player.addEventListener('ended', () => loadTrack(trackIndex + 1, true));
playPauseBtn.addEventListener('click', () => {
  if (player.paused) { player.play().catch(() => {}); playPauseBtn.textContent = '⏸'; }
  else               { player.pause(); playPauseBtn.textContent = '▶'; }
});
player.addEventListener('play',  () => { playPauseBtn.textContent = '⏸'; });
player.addEventListener('pause', () => { playPauseBtn.textContent = '▶'; });
skipBtn.addEventListener('click', () => loadTrack(trackIndex + 1, !player.paused));

/* ── 4. Start overlay ─────────────────────────────────────────── */
const startOverlay = document.getElementById('start-overlay');
const startBtn     = document.getElementById('start-btn');
function start() {
  startOverlay.classList.add('hide');
  loadTrack(0, true);
  setTimeout(() => startOverlay.remove(), 600);
}
startBtn.addEventListener('click', start);
startOverlay.addEventListener('click', (e) => { if (e.target === startOverlay) start(); });
</script>
</body>
</html>

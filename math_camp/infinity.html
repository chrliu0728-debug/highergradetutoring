<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinity Mode — HigherGrade Tutoring</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/webp" href="logo.webp" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0E1733 0%, #2A2447 50%, #4A1B6E 100%);
      color: #FAF0E0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(167,139,250,.30) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(236,72,153,.22) 0%, transparent 38%);
    }
    .wrap {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 30px 20px;
    }
    .card {
      width: min(560px, 96vw);
      background: rgba(20, 14, 40, 0.88);
      border: 1px solid rgba(167,139,250,0.28);
      border-radius: 18px;
      padding: 32px 32px 28px;
      box-shadow: 0 28px 56px rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .head .infinity {
      font-size: 2rem; line-height: 1;
      filter: drop-shadow(0 0 10px rgba(167,139,250,.55));
    }
    .head .points {
      background: rgba(232, 196, 90, 0.16);
      border: 1px solid rgba(232, 196, 90, 0.4);
      color: #E8C45A;
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 700; font-size: .82rem;
    }
    h1 { font-size: 1.4rem; margin: 0 0 4px; }
    .lede { font-size: .88rem; color: rgba(250, 240, 224, 0.68); margin: 0 0 22px; line-height: 1.55; }
    .qmeta {
      font-size: .68rem; text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(167, 139, 250, 0.85);
      margin-bottom: 6px;
    }
    .qtext {
      font-family: 'JetBrains Mono', 'SFMono-Regular', monospace;
      font-size: 1.4rem; font-weight: 600;
      margin-bottom: 18px;
      word-wrap: break-word;
      min-height: 56px;
    }
    .doors {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .door {
      position: relative;
      padding: 28px 16px;
      border: 2px solid rgba(167, 139, 250, 0.35);
      background: linear-gradient(180deg, rgba(109,40,217,0.20), rgba(46,16,101,0.40));
      color: #FAF0E0;
      border-radius: 14px;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, border-color .18s;
      font-family: 'JetBrains Mono', 'SFMono-Regular', monospace;
      font-size: 1.6rem; font-weight: 800;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .door:hover {
      transform: translateY(-3px);
      border-color: rgba(236, 72, 153, 0.7);
      box-shadow: 0 12px 28px rgba(109, 40, 217, 0.45);
    }
    .door:disabled, .door.locked {
      cursor: default;
      transform: none;
      box-shadow: none;
      opacity: 0.7;
    }
    .door.right-pick {
      border-color: #6FE08A;
      box-shadow: 0 0 0 3px rgba(111,224,138,0.2);
      animation: door-glow .55s ease-out;
    }
    .door.wrong-pick {
      border-color: #FFA0A0;
      box-shadow: 0 0 0 3px rgba(255,160,160,0.2);
      animation: door-shake .35s ease;
    }
    @keyframes door-glow {
      0%   { box-shadow: 0 0 0 0 rgba(111,224,138,0.4); }
      100% { box-shadow: 0 0 0 12px rgba(111,224,138,0); }
    }
    @keyframes door-shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .feedback {
      margin-top: 10px;
      min-height: 1.2em;
      font-size: .9rem; font-weight: 600;
    }
    .feedback.ok  { color: #6FE08A; }
    .feedback.err { color: #FFA0A0; }
    .meta-row {
      display: flex; justify-content: space-between;
      margin-top: 18px;
      font-size: .78rem;
      color: rgba(250, 240, 224, 0.55);
      letter-spacing: 0.04em;
    }
    .meta-row a { color: rgba(232, 196, 90, 0.85); text-decoration: none; }
    .meta-row a:hover { color: rgba(232, 196, 90, 1); }
    .empty {
      padding: 30px 0; text-align: center;
      color: rgba(250, 240, 224, 0.65);
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="card" id="card">
    <div class="head">
      <div class="infinity">∞</div>
      <div class="points" id="points">+0 pts this session</div>
    </div>
    <h1>Infinity Mode</h1>
    <p class="lede">Endless dungeon. Every answer (right or wrong) earns +6 points. Questions are added by the camp staff.</p>

    <div class="qmeta" id="qmeta">Question</div>
    <div class="qtext" id="qtext">Loading…</div>
    <div class="doors" id="doors">
      <button class="door" id="door-l" data-side="L">—</button>
      <button class="door" id="door-r" data-side="R">—</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="meta-row">
      <span id="counter">Q 0</span>
      <a href="student-portal.html">← Back to dashboard</a>
    </div>
  </div>
</div>

<script>
const ptsEl   = document.getElementById('points');
const qmeta   = document.getElementById('qmeta');
const qtext   = document.getElementById('qtext');
const doorL   = document.getElementById('door-l');
const doorR   = document.getElementById('door-r');
const fbEl    = document.getElementById('feedback');
const counterEl = document.getElementById('counter');

let questions = [];
let asked = 0;
let earned = 0;
let currentQ = null;

async function ensureSignedIn() {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'same-origin' });
    const j = await r.json();
    if (!j || j.kind !== 'student') {
      window.location.replace('student-portal.html');
      return false;
    }
    return true;
  } catch (_) {
    window.location.replace('student-portal.html');
    return false;
  }
}

async function loadQuestions() {
  const r = await fetch('/api/infinity-questions');
  const j = await r.json();
  questions = (j && j.data) || [];
}

function pickQuestion() {
  // Skip questions without a wrong answer (legacy rows from before this
  // feature) so students never see a single-door choice.
  const usable = questions.filter(q => (q.wrongAnswer || '').trim().length > 0);
  if (!usable.length) return null;
  return usable[Math.floor(Math.random() * usable.length)];
}

let leftIsCorrect = true;

function renderQuestion() {
  const q = questions.length ? pickQuestion() : null;
  if (!q) {
    qmeta.textContent = 'Empty bank';
    qtext.textContent = "No infinity-mode questions with both choices yet. Check back later.";
    doorL.disabled = true; doorR.disabled = true;
    doorL.textContent = '—'; doorR.textContent = '—';
    fbEl.className = 'feedback'; fbEl.textContent = '';
    return;
  }
  currentQ = q;
  leftIsCorrect = Math.random() < 0.5;
  qmeta.textContent = `Question · #${asked + 1}`;
  qtext.textContent = q.question;
  doorL.textContent = leftIsCorrect ? q.answer : q.wrongAnswer;
  doorR.textContent = leftIsCorrect ? q.wrongAnswer : q.answer;
  doorL.disabled = false; doorR.disabled = false;
  doorL.classList.remove('right-pick', 'wrong-pick');
  doorR.classList.remove('right-pick', 'wrong-pick');
  fbEl.className = 'feedback'; fbEl.textContent = '';
}

async function pickDoor(side) {
  if (!currentQ) return;
  if (doorL.disabled && doorR.disabled) return;
  doorL.disabled = true; doorR.disabled = true;
  const isCorrect = (side === 'L') ? leftIsCorrect : !leftIsCorrect;
  const chosenEl  = (side === 'L') ? doorL : doorR;
  chosenEl.classList.add(isCorrect ? 'right-pick' : 'wrong-pick');

  // Award +6 server-side (every submitted answer earns).
  try {
    const r = await fetch('/api/students/me/infinity-answer', {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    const j = await r.json();
    if (j && j.ok) {
      earned += (j.data && j.data.awarded) || 6;
      ptsEl.textContent = `+${earned} pts this session`;
    }
  } catch (_) {}

  if (isCorrect) {
    fbEl.className = 'feedback ok';
    fbEl.textContent = '✅ Right door · +6';
  } else {
    fbEl.className = 'feedback err';
    fbEl.textContent = `Wrong door (answer: ${currentQ.answer}) · +6 anyway`;
  }
  asked++;
  counterEl.textContent = `Q ${asked}`;
  setTimeout(renderQuestion, 950);
}

doorL.addEventListener('click', () => pickDoor('L'));
doorR.addEventListener('click', () => pickDoor('R'));

(async function init() {
  if (!(await ensureSignedIn())) return;
  await loadQuestions();
  renderQuestion();
})();
</script>
</body>
</html>

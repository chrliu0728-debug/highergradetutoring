# ──────────────────────────────────────────────────────────────
# Alternative nginx config (use this instead of Caddy if you prefer)
# Pair with `certbot --nginx` to get HTTPS automatically.
#
# Save to: /etc/nginx/sites-available/highergrade
# Enable:  sudo ln -s /etc/nginx/sites-available/highergrade /etc/nginx/sites-enabled/
# Then:    sudo certbot --nginx -d yourdomain.ca -d www.yourdomain.ca
# ──────────────────────────────────────────────────────────────

server {
    listen      80;
    listen      [::]:80;
    server_name highergradetutoring.ca www.highergradetutoring.ca;

    root /var/www/highergrade;
    index index.html;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long cache for static assets
    location ~* \.(?:png|jpg|jpeg|gif|svg|webp|woff2?|ttf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Short cache for code/markup so updates roll out fast
    location ~* \.(?:html|css|js)$ {
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # Hide dotfiles
    location ~ /\. { deny all; }

    # Default fallback to index.html for clean URLs
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
